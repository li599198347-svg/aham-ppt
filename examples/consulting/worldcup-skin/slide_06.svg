ize="11.5" fill="#9B9B9B">欧洲占比</text><text x="1100" y="342" text-anchor="start" font-family="'JetBrains Mono', Consolas, monospace" font-size="26" fill="#C9A227" font-weight="700">33.3%</text><text x="1100" y="364" text-anchor="start" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#6E6E6E">16 席 / 48 席</text><rect x="330" y="560" width="380" height="72" rx="12" fill="#F6F1E2"/><text x="350" y="586" text-anchor="start" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#262626" font-weight="700">洲际附加赛 · 6 队争最后 2 席</text><text x="350" y="612" text-anchor="start" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#6E6E6E">非洲/亚洲/南美/大洋洲各 1 队＋中北美 2 队</text><rect x="740" y="560" width="380" height="72" rx="12" fill="#F6F1E2"/><text x="760" y="586" text-anchor="start" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#262626" font-weight="700">东道主美墨加 · 免预选赛</text><circle cx="766" cy="608" r="5" fill="#2B4C9B"/><circle cx="784" cy="608" r="5" fill="#157A44"/><circle cx="802" cy="608" r="5" fill="#C42B3C"/><text x="812" y="612" text-anchor="start" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#6E6E6E">3 个席位计入中北美 6 席之内</text><line x1="452" y1="534" x2="452.0" y2="549.0" stroke="#C9A227" stroke-width="1.4"/><polygon points="452.0,556.0 449.1,549.6 454.9,549.6" fill="#C9A227"/><text x="40" y="566" text-anchor="start" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13.5" fill="#262626" font-weight="700">46 席直通</text><text x="40" y="590" text-anchor="start" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13.5" fill="#262626" font-weight="700">+ 2 席附加赛</text><text x="40" y="614" text-anchor="start" font-family="'JetBrains Mono', Consolas, monospace" font-size="13.5" fill="#262626" font-weight="700">= 48</text><rect x="40" y="642" width="1200" height="36" rx="6" fill="#171717"/><text x="62" y="665.0" text-anchor="start" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12.5" fill="#C9A227" font-weight="700">So-What</text><text x="136" y="665.0" text-anchor="start" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#FFFFFF">48 席里 45 席是打出来的——除 3 个东道主，每张门票都过了预选赛或附加赛</text><line x1="40" y1="690" x2="1240" y2="690" stroke="#E7E7E7" stroke-width="1"/><text x="40" y="709" text-anchor="start" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#9B9B9B">来源：FIFA.com（名额分配）· Wikipedia 2026 qualification ；配色近似官方黑·白·金＋三国色调（未公开固定 HEX）</text><text x="1240" y="709" text-anchor="end" font-family="'JetBrains Mono', Consolas, monospace" font-size="11" fill="#9B9B9B">6 / 10</text></svg>