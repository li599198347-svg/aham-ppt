2="210" stroke="#9B9B9B" stroke-width="2.2"/><polygon points="1020.0,210.0 1012.7,213.3 1012.7,206.7" fill="#9B9B9B"/><text x="971.0" y="198" text-anchor="middle" font-family="'JetBrains Mono', Consolas, monospace" font-size="10" fill="#6E6E6E" font-weight="700">-1</text><circle cx="1052" cy="210" r="22" fill="#262626"/><text x="1052" y="215" text-anchor="middle" font-family="'JetBrains Mono', Consolas, monospace" font-size="13" fill="#FFFFFF" font-weight="700">1</text><rect x="1092" y="193" width="104" height="34" rx="17" fill="#262626"/><text x="1144" y="215" text-anchor="middle" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12.5" fill="#FFFFFF" font-weight="700">冠军 · 8 场</text><text x="80" y="258" text-anchor="middle" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#6E6E6E">小组赛</text><text x="242" y="258" text-anchor="middle" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#6E6E6E">32 强</text><text x="404" y="258" text-anchor="middle" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#6E6E6E">16 强</text><text x="566" y="258" text-anchor="middle" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#6E6E6E">1/4 决赛</text><text x="728" y="258" text-anchor="middle" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#6E6E6E">半决赛</text><text x="890" y="258" text-anchor="middle" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#6E6E6E">决赛</text><text x="1052" y="258" text-anchor="middle" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#6E6E6E">冠军</text><text x="40" y="342" text-anchor="start" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12.5" fill="#262626" font-weight="700">48 队的终点 · 47 队止步 + 1 队夺冠</text><rect x="40.0" y="356" width="400.0" height="26" rx="2" fill="#9B9B9B"/><text x="240.0" y="374" text-anchor="middle" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11.5" fill="#FFFFFF" font-weight="700">小组赛 16</text><rect x="440.0" y="356" width="400.0" height="26" rx="2" fill="#C8C8C8"/><text x="640.0" y="374" text-anchor="middle" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11.5" fill="#FFFFFF" font-weight="700">32强 16</text><rect x="840.0" y="356" width="200.0" height="26" rx="2" fill="#9B9B9B"/><text x="940.0" y="374" text-anchor="middle" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11.5" fill="#FFFFFF" font-weight="700">16强 8</text><rect x="1040.0" y="356" width="100.0" height="26" rx="2" fill="#C8C8C8"/><line x1="1090.0" y1="355" x2="1090.0" y2="351" stroke="#C4C4C4" stroke-width="1"/><text x="1090.0" y="348" text-anchor="middle" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="9.5" fill="#6E6E6E" font-weight="700">1/4 决赛 4</text><rect x="1140.0" y="356" width="50.0" height="26" rx="2" fill="#9B9B9B"/><line x1="1165.0" y1="355" x2="1165.0" y2="337" stroke="#C4C4C4" stroke-width="1"/><text x="1165.0" y="334" text-anchor="middle" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="9.5" fill="#6E6E6E" font-weight="700">半决赛 2</text><rect x="1190.0" y="356" width="25.0" height="26" rx="2" fill="#C8C8C8"/><rect x="1215.0" y="356" width="25.0" height="26" rx="2" fill="#262626"/><text x="40" y="402" text-anchor="start" font-family="'JetBrains Mono', Consolas, monospace" font-size="13" fill="#6E6E6E">16+16+8+4+2+1+1 = 48</text><text x="1240" y="402" text-anchor="end" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#9B9B9B">右端两细段 = 决赛负者 1 · 冠军 1（黑）</text><rect x="40" y="476" width="560" height="108" rx="12" fill="#F3F3F3"/><text x="62" y="506" text-anchor="start" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13.5" fill="#262626" font-weight="700">多出来的一轮</text><text x="62" y="534" text-anchor="start" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12.5" fill="#6E6E6E">2022 · 淘汰赛 4 轮 · 冠军踢 7 场</text><text x="62" y="560" text-anchor="start" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12.5" fill="#262626">2026 · 淘汰赛 5 轮 · 冠军踢 8 场（新增 32 强轮）</text><rect x="640" y="476" width="600" height="108" rx="12" fill="#F3F3F3"/><text x="662" y="506" text-anchor="start" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13.5" fill="#262626" font-weight="700">输赢都有价（2026 奖金）</text><text x="662" y="544" text-anchor="start" font-family="'JetBrains Mono', Consolas, monospace" font-size="22" fill="#262626" font-weight="700">$12.5M</text><text x="662" y="568" text-anchor="start" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11.5" fill="#6E6E6E">每队保底</text><text x="852" y="544" text-anchor="start" font-family="'JetBrains Mono', Consolas, monospace" font-size="22" fill="#262626" font-weight="700">$33M</text><text x="852" y="568" text-anchor="start" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11.5" fill="#6E6E6E">亚军</text><text x="1042" y="544" text-anchor="start" font-family="'JetBrains Mono', Consolas, monospace" font-size="22" fill="#262626" font-weight="700">$50M</text><text x="1042" y="568" text-anchor="start" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11.5" fill="#6E6E6E">冠军</text><text x="1216" y="568" text-anchor="end" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11.5" fill="#6E6E6E">保底到冠军 x4.0</text><rect x="40" y="642" width="1200" height="36" rx="6" fill="#F3F3F3"/><text x="62" y="665.0" text-anchor="start" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12.5" fill="#262626" font-weight="700">So-What</text><text x="136" y="665.0" text-anchor="start" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#262626">47 队的终点都是失利，但没人空手——从保底 $12.5M 到冠军 $50M</text><line x1="40" y1="690" x2="1240" y2="690" stroke="#E7E7E7" stroke-width="1"/><text x="40" y="709" text-anchor="start" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#9B9B9B">来源：FIFA.com（赛制）· Fortune / SI（奖金，2026-06）</text><text x="1240" y="709" text-anchor="end" font-family="'JetBrains Mono', Consolas, monospace" font-size="11" fill="#9B9B9B">9 / 10</text></svg>