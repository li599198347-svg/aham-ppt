<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg"><rect width="1280" height="720" fill="#FFFFFF"/><text x="40" y="24" text-anchor="start" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#9B9B9B" letter-spacing="1">04 收官</text><rect x="1188" y="16" width="9" height="9" rx="2" fill="#336EE8"/><text x="1240" y="24" text-anchor="end" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#262626" font-weight="600">Aham</text><line x1="40" y1="32" x2="1240" y2="32" stroke="#E7E7E7" stroke-width="1"/><text x="40" y="74" text-anchor="start" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="26" fill="#262626" font-weight="700">淘汰赛加了一整轮：夺冠从 7 场变 8 场</text><line x1="40" y1="90" x2="1240" y2="90" stroke="#E7E7E7" stroke-width="1"/><text x="640" y="500" font-family="'JetBrains Mono', Consolas, monospace" font-size="320" font-weight="900" fill="#262626" opacity="0.035" text-anchor="middle">1</text><text x="60" y="128" text-anchor="start" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11.5" fill="#9B9B9B">节点＝存活球队数 · 箭上＝该轮淘汰数 · 蓝圈＝起点 48</text><circle cx="80" cy="210" r="22" fill="#FFFFFF" stroke="#336EE8" stroke-width="2.6"/><text x="80" y="215" text-anchor="middle" font-family="'JetBrains Mono', Consolas, monospace" font-size="13" fill="#262626" font-weight="700">48</text><line x1="106" y1="210" x2="208" y2="210" stroke="#9B9B9B" stroke-width="2.2"/><polygon points="210.0,210.0 202.7,213.3 202.7,206.7" fill="#9B9B9B"/><text x="161.0" y="198" text-anchor="middle" font-family="'JetBrains Mono', Consolas, monospace" font-size="10" fill="#6E6E6E" font-weight="700">-16</text><circle cx="242" cy="210" r="22" fill="#262626"/><text x="242" y="215" text-anchor="middle" font-family="'JetBrains Mono', Consolas, monospace" font-size="13" fill="#FFFFFF" font-weight="700">32</text><line x1="268" y1="210" x2="370" y2="210" stroke=