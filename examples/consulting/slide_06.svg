<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg"><rect width="1280" height="720" fill="#FFFFFF"/><text x="40" y="24" text-anchor="start" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#9B9B9B" letter-spacing="1">02 赛制</text><rect x="1188" y="16" width="9" height="9" rx="2" fill="#336EE8"/><text x="1240" y="24" text-anchor="end" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#262626" font-weight="600">Aham</text><line x1="40" y1="32" x2="1240" y2="32" stroke="#E7E7E7" stroke-width="1"/><text x="40" y="74" text-anchor="start" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="26" fill="#262626" font-weight="700">48 个席位来自 6 条通道：46 直通 + 2 附加</text><line x1="40" y1="90" x2="1240" y2="90" stroke="#E7E7E7" stroke-width="1"/><text x="60" y="128" text-anchor="start" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11.5" fill="#9B9B9B">带宽∝席位数 · 46 直通 + 2 附加 = 48</text><rect x="920" y="204.6" width="150" height="280.8" rx="8" fill="#262626"/><text x="995.0" y="341.0" text-anchor="middle" font-family="'JetBrains Mono', Consolas, monospace" font-size="34" fill="#FFFFFF" font-weight="700">48</text><text x="995.0" y="367.0" text-anchor="middle" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11.5" fill="#FFFFFF">参赛席位</text><rect x="330" y="150" width="120" height="114.0" rx="2" fill="#9B9B9B"/><text x="320" y="211.0" text-anchor="end" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11.5" fill="#262626" font-weight="700">欧洲 UEFA</text><text x="390.0" y="211.0" text-anchor="middle" font-family="'JetBrains Mono', Consolas, monospace" font-size="11.5" fill="#FFFFFF" font-weight="700">16</text><polygon points="450,150 920,210.6 920,300.2 450,264.0" fill="#9B9B9B" opacity="0.28"/><rect x="330" y="272.0" width="120" height="64.125" rx="2" fill="#C8C8C8"/><text x="320" y="308.0625" text-anchor="end" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11.5" fill="#262626" font-weight="700">非洲 CAF</text><text x="390.0" y="308.0625" text-anchor="middle" font-family="'JetBrains Mono', Consolas, monospace" font-size="11.5" fill="#FFFFFF" font-weight="700">9</text><polygon points="450,272.0 920,300.2 920,350.59999999999997 450,336.125" fill="#C8C8C8" opacity="0.28"/><rect x="330" y="344.125" width="120" height="57.0" rx="2" fill="#9B9B9B"/><text x="320" y="376.625" text-anchor="end" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11.5" fill="#262626" font-weight="700">亚洲 AFC</text><text x="390.0" y="376.625" text-anchor="middle" font-family="'JetBrains Mono', Consolas, monospace" font-size="11.5" fill="#FFFFFF" font-weight="700">8</text><polygon points="450,344.125 920,350.59999999999997 920,395.4 450,401.125" fill="#9B9B9B" opacity="0.28"/><rect x="330" y="409.125" width="120" height="42.75" rx="2" fill="#C8C8C8"/><text x="320" y="434.5" text-anchor="end" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11.5" fill="#262626" font-weight="700">南美 CONMEBOL</text><text x="390.0" y="434.5" text-anchor="middle" font-family="'JetBrains Mono', Consolas, monospace" font-size="11.5" fill="#FFFFFF" font-weight="700">6</text><polygon points="450,409.125 920,395.4 920,429.0 450,451.875" fill="#C8C8C8" opacity="0.28"/><rect x="330" y="459.875" width="120" height="42.75" rx="2" fill="#9B9B9B"/><text x="320" y="485.25" text-anchor="end" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11.5" fill="#262626" font-weight="700">中北美 CONCACAF</text><text x="390.0" y="485.25" text-anchor="middle" font-family="'JetBrains Mono', Consolas, monospace" font-size="11.5" fill="#FFFFFF" font-weight="700">6</text><polygon points="450,459.875 920,429.0 920,462.6 450,502.625" fill="#9B9B9B" opacity="0.28"/><rect x="330" y="510.625" width="120" height="7.125" rx="2" fill="#C8C8C8"/><text x="320" y="518.1875" text-anchor="end" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11.5" fill="#262626" font-weight="700">大洋洲 OFC</text><text x="458" y="518.1875" text-anchor="start" font-family="'JetBrains Mono', Consolas, monospace" font-size="10.5" fill="#C8C8C8" font-weight="700">1</text><polygon points="450,510.625 920,462.6 920,468.20000000000005 450,517.75" fill="#C8C8C8" opacity="0.28"/><rect x="330" y="525.75" width="120" height="14.25" rx="2" fill="#9B9B9B"/><text x="320" y="536.875" text-anchor="end" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11.5" fill="#262626" font-weight="700">洲际附加赛</text><text x="458" y="536.875" text-anchor="start" font-family="'JetBrains Mono', Consolas, monospace" font-size="10.5" fill="#9B9B9B" font-weight="700">2</text><polygon points="450,525.75 920,468.20000000000005 920,479.40000000000003 450,540.0" fill="#9B9B9B" opacity="0.28"/><text x="1100" y="310" text-anchor="start" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11.5" fill="#9B9B9B">欧洲占比</text><text x="1100" y="342" text-anchor="start" font-family="'JetBrains Mono', Consolas, monospace" font-size="26" fill="#336EE8" font-weight="700">33.3%</text><text x="1100" y="364" text-anchor="start" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#6E6E6E">16 席 / 48 席</text><rect x="330" y="560" width="380" height="72" rx="12" fill="#F3F3F3"/><text x="350" y="586" text-anchor="start" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#262626" font-weight="700">洲际附加赛 · 6 队争最后 2 席</text><text x="350" y="612" text-anchor="start" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#6E6E6E">非洲/亚洲/南美/大洋洲各 1 队＋中北美 2 队</text><rect x="740" y="560" width="380" height="72" rx="12" fill="#F3F3F3"/><text x="760" y="586" text-anchor="start" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#262626" font-weight="700">东道主美墨加 · 免预选赛</text><text x="760" y="612" text-anchor="start" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#6E6E6E">3 个席位计入中北美 6 席之内</text><line x1="452" y1="534" x2="452.0" y2="549.0" stroke="#6E6E6E" stroke-width="1.4"/><polygon points="452.0,556.0 449.1,549.6 454.9,549.6" fill="#6E6E6E"/><text x="40" y="566" text-anchor="start" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13.5" fill="#262626" font-weight="700">46 席直通</text><text x="40" y="590" text-anchor="start" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13.5" fill="#262626" font-weight="700">+ 2 席附加赛</text><text x="40" y="614" text-anchor="start" font-family="'JetBrains Mono', Consolas, monospace" font-size="13.5" fill="#262626" font-weight="700">= 48</text><rect x="40" y="642" width="1200" height="36" rx="6" fill="#F3F3F3"/><text x="62" y="665.0" text-anchor="start" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12.5" fill="#262626" font-weight="700">So-What</text><text x="136" y="665.0" text-anchor="start" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#262626">48 席里 45 席是打出来的——除 3 个东道主，每张门票都过了预选赛或附加赛</text><line x1="40" y1="690" x2="1240" y2="690" stroke="#E7E7E7" stroke-width="1"/><text x="40" y="709" text-anchor="start" font-family="Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#9B9B9B">来源：FIFA.com（名额分配）· Wikipedia 2026 qualification</text><text x="1240" y="709" text-anchor="end" font-family="'JetBrains Mono', Consolas, monospace" font-size="11" fill="#9B9B9B">6 / 10</text></svg>